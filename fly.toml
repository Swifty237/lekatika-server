# fly.toml app configuration file generated for lekatika-server on 2026-07-20T05:59:28Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lekatika-server'
primary_region = 'cdg'

[build]
  [build.args]
    GO_VERSION = '1.26.3'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
